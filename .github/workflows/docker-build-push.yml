name: Docker Build and Push

on:
  push:
    branches:
      - 'feature-*'  # Triggers on any branch starting with "feature-"
      - 'main'       # Triggers on push to main (merged PR)

env:
  DOCKER_USERNAME: ilyadevsec
  DOCKER_PASSWORD: ${{ secrets.MY_DOCKER_PAT }}
  IMAGE_NAME: ilyadevsec/simple-flask-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build the Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Step 4: Tag as latest (main branch only)
      - name: Tag as latest
        if: github.ref == 'refs/heads/main'
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      # Step 5: Push to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker push ${{ env.IMAGE_NAME }}:latest
          fi

      # Step 6: Run container locally (main branch only)
      - name: Run container locally
        if: github.ref == 'refs/heads/main'
        run: |
          docker run -d --name flask-test -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5  # Wait for Flask to start

      # Step 7: Test with curl (main branch only)
      - name: Test Flask app with curl
        if: github.ref == 'refs/heads/main'
        run: |
          RESPONSE=$(curl -s http://localhost:5000)
          echo "Response: $RESPONSE"
          if [ $? -eq 0 ]; then
            echo "✅ Test passed! Flask app is responding."
          else
            echo "❌ Test failed!"
            exit 1
          fi

      # Step 8: Clean up
      - name: Stop and remove container
        if: github.ref == 'refs/heads/main'
        run: |
          docker stop flask-test
          docker rm flask-test
